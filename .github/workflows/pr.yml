name: PR validation
on: pull_request

env:
  PROXYGEN_CLIENT_ID: ${{ secrets.PROXYGEN_CLIENT_ID }}
  PROXYGEN_CLIENT_SECRET: ${{ secrets.PROXYGEN_CLIENT_SECRET }}

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: pr

      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/heads/main
          path: main

      - name: Extract current version
        id: versions
        run: |
          echo ::set-output name=current::$(grep version main/pyproject.toml | awk -F\" '{print $2}')
          echo ::set-output name=candidate::$(grep version pr/pyproject.toml | awk -F\" '{print $2}')

      - name: Install Python 3.13
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: 3.13

      - name: Compare versions
        run: python pr/scripts/compare_version.py ${{ steps.versions.outputs.current }}
          ${{ steps.versions.outputs.candidate }}
